<style>

    height: 90px;

                0 0 120px 60px rgba(245,168,0,0.15);
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 22%;
    background: linear-gradient(180deg, #1a3a6e 0%, #0d2248 100%);
    border-top-left-radius: 50% 18px;
    border-top-right-radius: 50% 18px;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  h2{
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    color: rgb(161, 157, 157);
    font-size: 1.5em;
    text-align: center;
  }
  h1{
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    color: #f5a800;
    font-size: 3em;
    text-align: center;
  }
  .button-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: row;
  gap: 15px;
  align-items: center;
}

button {
  padding: 15px 30px;
  font-size: 1.2em;
  color: black;
  background-color: #f1b32c;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  width: 200px;
}

#highscore-button {
  color: grey;
  border: 1px solid grey;
  background: transparent;
}
button:hover {
  background-color: #f1b32c;
  color: white;
  box-shadow: 0 4px 12px rgba(241, 179, 44, 0.5);
  
}
  
</style>
