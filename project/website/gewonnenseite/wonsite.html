<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight of Continents - Victory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body{
            
            background: linear-gradient(180deg, #0a1628 0%, #0d2248 40%, #1a3a6e 70%, #2a5a8a 100%);
        }
        #box{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.1);
            width: 450px;
            padding: 30px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        #boxendrittel{
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }
        #boxendrittel button{
            background-color: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 18px;
            color: white;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }
        #boxendrittel button:hover{
            background-color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }
        h1{
            color: #6aff00;
            text-align: center;
            margin: 5px 0;
            font-size: 1.8em;
        }
        h1:first-of-type {
            font-size: 1.2em;
            opacity: 0.9;
        }
        #againbutton{
            background-color: #ffd700 ;
            border: none ;
            color: #0a1628;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3) ;
        }
        #againbutton:hover{
            background-color: #ffed4e ;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div id="box">
        <h1>Gelandet</h1>
        <h1>Du hast dein Ziel erreicht!</h1>
        <div id="boxendrittel">
            <div id="yellowbox">Länder:</div>
            <div>Richtig:</div>
            <div>Punkte:</div>
        </div>
        <div id="boxendrittel">
        <button id="againbutton">Again</button>
        <button>Highscore</button>
        <button>Home</button>
        </div>
    </div>
    
</body>
</html>
